<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library - Tyler Moessing</title>
    <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
    <link rel="stylesheet" href="css/games.css">
    <script type="module" src="js/games-main.js"></script>
</head>

<body>
    <div class="library-page">
        <header class="library-header" style="justify-content: flex-end;">
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
                <svg class="sun-icon icon icon-stroke" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
                <svg class="moon-icon icon icon-stroke" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;"><path d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
            </button>
        </header>

        <div class="library-hero">
            <h1>Game Library</h1>
            <p>My collection — browse the shelf, or let the dice decide. Hit <strong>Pick a Game</strong> and I'll help you land on something for tonight.</p>
        </div>

        <div class="library-toolbar">
            <div class="search-input-wrapper" style="position: relative; flex: 1; max-width: 320px; display: flex; align-items: center;">
                <svg class="icon icon-stroke search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="position: absolute; left: 12px; width: 1.1rem; height: 1.1rem; stroke: var(--text-muted); pointer-events: none;"><path d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
                <input type="text" id="game-search-input" placeholder="Search games..." style="width: 100%; padding: 9px 12px 9px 38px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--card-bg); color: var(--text-primary); font-size: 0.9rem; outline: none; transition: all 0.2s ease;">
            </div>
            <span id="games-count" class="games-count"></span>
            <div class="toolbar-controls">
                <div class="view-toggle" role="group" aria-label="View mode">
                    <button type="button" id="view-grid" class="view-btn active" aria-label="Grid view" title="Grid view" aria-pressed="true">
                        <svg class="icon icon-stroke" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" /></svg>
                    </button>
                    <button type="button" id="view-list" class="view-btn" aria-label="List view" title="List view" aria-pressed="false">
                        <svg class="icon icon-stroke" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
                    </button>
                </div>
                <label>Sort
                    <select id="library-sort">
                        <option value="alpha">A–Z</option>
                        <option value="playtime">Playtime</option>
                        <option value="players">Players</option>
                    </select>
                </label>
                <button type="button" id="library-shuffle" class="btn btn-secondary" style="gap: 6px;">
                    <svg class="icon icon-stroke" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:0.95rem; height:0.95rem;"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
                    Shuffle
                </button>
                <button type="button" id="pick-a-game-btn" class="btn btn-primary" style="gap: 6px;">
                    <svg class="icon icon-stroke" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:0.95rem; height:0.95rem;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M12 12h.01M16 8h.01M8 16h.01M8 8h.01M16 16h.01"/></svg>
                    Pick a Game
                </button>
            </div>
        </div>

        <div id="games-grid" class="games-grid"></div>
    </div>
</body>

</html>
